apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aiops-hpa
  namespace: aiops-banco
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aiops-app   
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
